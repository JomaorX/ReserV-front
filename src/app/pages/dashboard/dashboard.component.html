<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
  <h1 class="text-2xl font-bold text-center mb-6">Bienvenido al Dashboard</h1>

  @if (userData) {
    <div>
      <p><strong>ID de Usuario:</strong> {{ userData.userId }}</p>
      <p><strong>Correo Electrónico:</strong> {{ userData.email }}</p>
    </div>
  } @else {
    <p>No estás autenticado. Redirigiendo al inicio de sesión...</p>
  }

  <!-- Botón para acceder al formulario de reserva -->
  <a routerLink="/reservation" class="block w-full py-2 px-4 bg-indigo-600 text-white font-semibold rounded-md text-center hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
    Realizar una Reserva
  </a>

  <!-- Botón para cerrar sesión -->
  <button (click)="logout()" class="mt-4 w-full py-2 px-4 bg-red-600 text-white font-semibold rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
    Cerrar Sesión
  </button>
</div>
